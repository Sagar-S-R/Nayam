# NAYAM (नयम्) — Nginx Reverse Proxy Configuration
# =====================================================================
# Production deployment:  Nginx → Uvicorn (app:8000)
# Handles TLS termination, static files, rate limiting, security headers.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time": "$time_iso8601",'
            '"remote_addr": "$remote_addr",'
            '"request": "$request",'
            '"status": $status,'
            '"body_bytes_sent": $body_bytes_sent,'
            '"request_time": $request_time,'
            '"upstream_response_time": "$upstream_response_time",'
            '"http_user_agent": "$http_user_agent",'
            '"request_id": "$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Performance ──────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── Gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream (Uvicorn) ───────────────────────────────────────
    upstream nayam_backend {
        server app:8000;
    }

    # ── HTTP → HTTPS redirect (uncomment when TLS is configured) ─
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        # ── Security Headers ─────────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── Request ID propagation ───────────────────────────────
        # Nginx generates a unique $request_id for every request.
        # Pass it to the backend so logs correlate end-to-end.

        # ── Health check (fast, no upstream) ─────────────────────
        location /health {
            proxy_pass http://nayam_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
        }

        # ── API Proxy ────────────────────────────────────────────
        location /api/ {
            proxy_pass http://nayam_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ── OpenAPI docs (non-production only) ───────────────────
        location /docs {
            proxy_pass http://nayam_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
        }

        location /redoc {
            proxy_pass http://nayam_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Request-ID $request_id;
        }

        location /openapi.json {
            proxy_pass http://nayam_backend;
            proxy_set_header Host $host;
        }

        # ── Deny everything else ─────────────────────────────────
        location / {
            return 404;
        }
    }
}
